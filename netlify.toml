[build]
  command = "bash netlify_build.sh"
  publish = "build/web"

[functions]
  directory = "netlify/functions"

[build.environment]
  # Firebase web config is public client-side (dart-define); project id also matches app package name.
  SECRETS_SCAN_OMIT_KEYS = "FIREBASE_API_KEY,FIREBASE_APP_ID,FIREBASE_PROJECT_ID,FIREBASE_MESSAGING_SENDER_ID,FIREBASE_AUTH_DOMAIN,FIREBASE_STORAGE_BUCKET,FIREBASE_MEASUREMENT_ID"

# Same-origin ntfy proxy (function handles POST + CORS preflight).
[[redirects]]
  from = "/api/ntfy/*"
  to = "/.netlify/functions/ntfy-proxy/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
