<!DOCTYPE html>
<html lang="nl">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="CatchLog — Stay focused. Stay aware.">

  <meta name="theme-color" content="#050508">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CatchLog">
  <meta name="format-detection" content="telephone=no">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <title>CatchLog</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #050508;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0c0c14 0%, #050508 45%, #000000 100%);
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #splash h1 {
      margin: 0 0 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    #splash p {
      margin: 0 0 32px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #8e8e93;
    }

    .ring {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 3px solid rgba(10, 132, 255, 0.2);
      border-top-color: #0a84ff;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="splash">
    <h1>CatchLog</h1>
    <p>Stay focused. Stay aware.</p>
    <div class="ring"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      if (!splash) return;
      splash.classList.add('fade-out');
      setTimeout(function () { splash.remove(); }, 400);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
